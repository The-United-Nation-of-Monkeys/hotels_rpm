# CI: юнит-тесты Django и FastAPI-сервисов, затем интеграционная проверка через Docker Compose.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  django-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django checks and tests
        run: |
          python manage.py check
          python manage.py test --verbosity 2

  payment-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: payment_service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: payment_service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/payment_service
        run: pytest -v

  notification-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification_service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: notification_service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/notification_service
        run: pytest -v

  docker-integration:
    runs-on: ubuntu-latest
    needs: [django-tests, payment-tests, notification-tests]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Start stack (booking, payment, notification, Kafka)
        run: |
          docker compose up -d zookeeper kafka notification payment booking

      - name: Wait for HTTP readiness
        run: |
          set -e
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8082/health >/dev/null \
              && curl -sf http://localhost:8083/health >/dev/null \
              && curl -sf http://localhost:8000/api/health/ >/dev/null; then
              echo "All core endpoints responded."
              exit 0
            fi
            echo "attempt $i ..."
            sleep 2
          done
          echo "Timeout waiting for services."
          docker compose logs --tail 80
          exit 1

      - name: Seed booking test data
        run: docker compose exec -T booking python manage.py seed_test_data

      - name: Integration script (curl API smoke test)
        run: chmod +x scripts/test_services.sh && ./scripts/test_services.sh

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
