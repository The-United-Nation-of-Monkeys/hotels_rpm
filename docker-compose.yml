 # Запуск всех трёх сервисов: Booking (Django), Payment, Notification
# docker-compose up --build
# Порядок запуска: notification → payment → booking (без циклических зависимостей)

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  notification:
    build: ./notification_service
    ports:
      - "8083:8083"
    environment:
      NOTIFICATION_BOOKING_SERVICE_URL: http://booking:8000
    command: uvicorn app.main:app --host 0.0.0.0 --port 8083

  payment:
    build: ./payment_service
    ports:
      - "8082:8082"
    environment:
      PAYMENT_NOTIFICATION_SERVICE_URL: http://notification:8083
      PAYMENT_RECEIPTS_DIR: /app/receipts
      PAYMENT_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYMENT_KAFKA_PAYMENT_TOPIC: payments
      PAYMENT_KAFKA_CONSUMER_GROUP: payment-service
      PAYMENT_KAFKA_CONSUMER_ENABLED: "true"
    volumes:
      - payment_receipts:/app/receipts
    depends_on:
      - notification
      - kafka
    command: uvicorn app.main:app --host 0.0.0.0 --port 8082

  booking:
    build: .
    ports:
      - "8000:8000"
    environment:
      PAYMENT_ENABLED: "True"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_PAYMENT_TOPIC: payments
    depends_on:
      - payment
      - kafka
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - booking
      - payment
      - notification

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  payment_receipts:
  grafana_data:
